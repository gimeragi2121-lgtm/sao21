<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVO-Asistente</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .title-bar {
      -webkit-app-region: drag;
      background: linear-gradient(90deg, #161b22 0%, #0d1117 100%);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
    }
    
    .title-bar h1 {
      font-size: 18px;
      color: #58a6ff;
      text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
    }
    
    .window-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    
    .window-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    
    .window-btn.minimize {
      background: #21262d;
      color: #8b949e;
    }
    
    .window-btn.minimize:hover {
      background: #30363d;
      color: #e6edf3;
    }
    
    .window-btn.maximize {
      background: #21262d;
      color: #8b949e;
    }
    
    .window-btn.maximize:hover {
      background: #30363d;
      color: #e6edf3;
    }
    
    .window-btn.close {
      background: #21262d;
      color: #8b949e;
    }
    
    .window-btn.close:hover {
      background: #f85149;
      color: #fff;
    }
    
    .container {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      grid-template-rows: 1fr 120px;
      height: calc(100vh - 57px);
      gap: 12px;
      padding: 12px;
    }
    
    .panel {
      background: #161b22;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #30363d;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .panel-title {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #30363d;
    }
    
    .skills-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .skill-item {
      background: #21262d;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 13px;
      border: 1px solid #30363d;
      transition: all 0.2s ease;
    }
    
    .skill-item:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.2);
    }
    
    .skill-name {
      color: #7ee787;
      font-weight: 700;
    }
    
    .skill-keywords {
      color: #8b949e;
      font-size: 11px;
      margin-top: 4px;
    }
    
    .log-panel {
      grid-column: 2;
      grid-row: 1;
    }
    
    .log-content {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      color: #8b949e;
    }
    
    .log-entry.error {
      color: #f85149;
    }
    
    .log-entry.success {
      color: #7ee787;
    }
    
    .log-entry.info {
      color: #58a6ff;
    }
    
    .right-panel {
      grid-column: 3;
      grid-row: 1;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #21262d;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8b949e;
    }
    
    .status-dot.listening {
      background: #7ee787;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #7ee787; }
      50% { opacity: 0.5; box-shadow: 0 0 16px #7ee787; }
    }
    
    .status-text {
      font-size: 13px;
    }
    
    .command-display {
      background: #21262d;
      border-radius: 8px;
      padding: 12px;
      min-height: 60px;
      margin-bottom: 12px;
    }
    
    .command-label {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    
    .command-text {
      font-size: 14px;
      color: #58a6ff;
      word-break: break-word;
    }
    
    .result-display {
      background: #21262d;
      border-radius: 8px;
      padding: 12px;
      flex: 1;
      overflow-y: auto;
    }
    
    .result-text {
      font-size: 13px;
      color: #e6edf3;
      white-space: pre-wrap;
    }
    
    .mic-panel {
      grid-column: 1 / 4;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }
    
    .mic-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #58a6ff;
      background: #161b22;
      color: #58a6ff;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .mic-button:hover {
      background: #58a6ff;
      color: #0d1117;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
    }
    
    .mic-button.active {
      background: #58a6ff;
      color: #0d1117;
      animation: pulse 1s infinite;
    }
    
    .input-field {
      flex: 1;
      max-width: 400px;
      padding: 16px 20px;
      border: 2px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      color: #e6edf3;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .input-field:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
    }
    
    .input-field::placeholder {
      color: #8b949e;
    }
    
    .reload-btn {
      padding: 12px 20px;
      border: 2px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      color: #8b949e;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .reload-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>⚡ EVO-Asistente</h1>
    <div class="window-controls">
      <button class="window-btn minimize" onclick="window.api.minimize()">─</button>
      <button class="window-btn maximize" onclick="window.api.maximize()">□</button>
      <button class="window-btn close" onclick="window.api.close()">✕</button>
    </div>
  </div>
  
  <div class="container">
    <div class="panel">
      <div class="panel-title">Habilidades</div>
      <div class="skills-list" id="skillsList"></div>
    </div>
    
    <div class="panel log-panel">
      <div class="panel-title">Registro</div>
      <div class="log-content" id="logContent"></div>
    </div>
    
    <div class="panel right-panel">
      <div class="panel-title">Estado</div>
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">En espera</div>
      </div>
      <div class="command-display">
        <div class="command-label">Último comando</div>
        <div class="command-text" id="commandText">-</div>
      </div>
      <div class="result-display">
        <div class="command-label">Resultado</div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>
    
    <div class="panel mic-panel">
      <button class="mic-button" id="micButton">🎤</button>
      <input type="text" class="input-field" id="commandInput" placeholder="Escribe un comando..." />
      <button class="reload-btn" onclick="reloadSkills()">↻ Recargar</button>
    </div>
  </div>
  
  <script>
    const micButton = document.getElementById('micButton');
    const commandInput = document.getElementById('commandInput');
    const commandText = document.getElementById('commandText');
    const resultText = document.getElementById('resultText');
    const statusDot = document.getElementById('statusDot');
    const statusTextEl = document.getElementById('statusText');
    const skillsList = document.getElementById('skillsList');
    const logContent = document.getElementById('logContent');
    
    let recognition = null;
    let isListening = false;
    
    function addLog(message, type = '') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = message;
      logContent.insertBefore(entry, logContent.firstChild);
      
      if (logContent.children.length > 100) {
        logContent.removeChild(logContent.lastChild);
      }
    }
    
    function updateSkills(skills) {
      skillsList.innerHTML = '';
      skills.forEach(skill => {
        const item = document.createElement('div');
        item.className = 'skill-item';
        item.innerHTML = `
          <div class="skill-name">${skill.name}</div>
          <div class="skill-keywords">${(skill.keywords || []).join(', ')}</div>
        `;
        skillsList.appendChild(item);
      });
    }
    
    async function processCommand(cmd) {
      if (!cmd.trim()) return;
      
      commandText.textContent = cmd;
      resultText.textContent = 'Procesando...';
      statusDot.classList.add('listening');
      statusTextEl.textContent = 'Procesando';
      
      try {
        const response = await window.api.processCommand(cmd);
        
        if (response.success) {
          resultText.textContent = response.result;
          addLog(`✓ ${cmd}`, 'success');
        } else {
          resultText.textContent = 'Error: ' + response.error;
          addLog(`✕ ${response.error}`, 'error');
        }
      } catch (e) {
        resultText.textContent = 'Error: ' + e.message;
        addLog(`✕ ${e.message}`, 'error');
      }
      
      statusDot.classList.remove('listening');
      statusTextEl.textContent = 'En espera';
      
      const skills = await window.api.getSkills();
      updateSkills(skills);
    }
    
    function reloadSkills() {
      window.api.reloadSkills().then(() => {
        window.api.getSkills().then(updateSkills);
        addLog('Habilidades recargadas', 'info');
      });
    }
    
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = true;
      
      recognition.onstart = () => {
        isListening = true;
        micButton.classList.add('active');
        statusDot.classList.add('listening');
        statusTextEl.textContent = 'Escuchando...';
        addLog('Iniciando reconocimiento de voz', 'info');
      };
      
      recognition.onend = () => {
        isListening = false;
        micButton.classList.remove('active');
        statusDot.classList.remove('listening');
        statusTextEl.textContent = 'En espera';
      };
      
      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        
        if (event.results[event.resultIndex].isFinal) {
          const confidence = event.results[event.resultIndex][0].confidence;
          if (confidence >= 0.7) {
            commandInput.value = transcript;
            processCommand(transcript);
          } else {
            addLog(`Confianza baja: ${confidence}`, 'error');
          }
        } else {
          commandInput.value = transcript;
        }
      };
      
      recognition.onerror = (event) => {
        addLog(`Error de reconocimiento: ${event.error}`, 'error');
        statusDot.classList.remove('listening');
        statusTextEl.textContent = 'En espera';
      };
    }
    
    micButton.addEventListener('click', () => {
      if (recognition) {
        if (isListening) {
          recognition.stop();
        } else {
          recognition.start();
        }
      } else {
        addLog('Reconocimiento de voz no disponible', 'error');
      }
    });
    
    commandInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        processCommand(commandInput.value);
      }
    });
    
    window.api.onLog((data) => {
      const type = data.includes('Error') ? 'error' : 
                  data.includes('✓') ? 'success' : '';
      addLog(data.trim(), type);
    });
    
    window.api.onSkillsLoaded((skills) => {
      updateSkills(skills);
    });
    
    window.api.getSkills().then(updateSkills);
    addLog('EVO-Asistente iniciado', 'info');
  </script>
</body>
</html>
