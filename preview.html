<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVO-Asistente - Vista Previa de Interfaz Visual</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Orbitron', monospace;
      color: #00ffff;
    }
    
    #background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .title {
      font-size: 24px;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      margin-bottom: 20px;
      letter-spacing: 2px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
      50% { text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff; }
    }
    
    .input-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }
    
    #commandInput {
      width: 100%;
      padding: 15px 20px;
      background: rgba(0, 20, 40, 0.7);
      border: 2px solid #00ffff;
      border-radius: 50px;
      color: #00ffff;
      font-size: 18px;
      font-family: 'Orbitron', monospace;
      outline: none;
      transition: all 0.3s ease;
      pointer-events: all;
    }
    
    #commandInput::placeholder {
      color: #00ffff80;
    }
    
    #commandInput:focus {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      background: rgba(0, 30, 60, 0.8);
    }
    
    .mic-button {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #00ffff;
      font-size: 24px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    
    .mic-button:hover {
      background: rgba(0, 255, 255, 0.2);
      transform: translateY(-50%) scale(1.1);
    }
    
    .mic-button.active {
      background: rgba(0, 255, 255, 0.4);
      animation: pulseMic 1s infinite;
    }
    
    @keyframes pulseMic {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
    }
    
    #logContainer {
      width: 100%;
      max-width: 600px;
      height: 200px;
      background: rgba(0, 10, 20, 0.6);
      border: 1px solid #00ffff;
      border-radius: 10px;
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
      pointer-events: all;
    }
    
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 2px solid #00ffff;
      background: rgba(0, 20, 40, 0.3);
    }
    
    .log-entry.success {
      border-left-color: #00ff00;
      color: #00ff00;
    }
    
    .log-entry.error {
      border-left-color: #ff0000;
      color: #ff0000;
    }
    
    .log-entry.info {
      border-left-color: #00ffff;
      color: #00ffff;
    }
    
    #statusIndicator {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: all;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8b949e;
    }
    
    .status-dot.listening {
      background: #00ffff;
      animation: pulseDot 1.5s infinite;
    }
    
    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 5px #00ffff; }
      50% { box-shadow: 0 0 15px #00ffff; }
    }
    
    .status-text {
      font-size: 14px;
    }
    
    /* Simulation controls */
    #simulationControls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #00ffff;
    }
    
    .sim-btn {
      background: rgba(0, 20, 40, 0.8);
      border: 1px solid #00ffff;
      color: #00ffff;
      padding: 8px 12px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .sim-btn:hover {
      background: rgba(0, 255, 255, 0.2);
      transform: translateY(-2px);
    }
    
    .sim-btn.active {
      background: rgba(0, 255, 255, 0.3);
      color: #000;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="title">⚡ EVO-ASISTENTE</div>
    
    <div class="input-container">
      <input type="text" id="commandInput" placeholder="Habla o escribe tu comando..." />
      <button class="mic-button" id="micButton">🎤</button>
    </div>
    
    <div id="logContainer"></div>
  </div>
  
  <div id="statusIndicator">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">En espera</div>
  </div>
  
  <canvas id="background"></canvas>
  
  <!-- Simulation controls -->
  <div id="simulationControls">
    <h3 style="color: #00ffff; margin-top: 0; font-size: 16px;">Controles de Simulación</h3>
    <button class="sim-btn" id="simulateHola">Simular "Hola"</button>
    <button class="sim-btn" id="simulateHora">Simular "¿Qué hora es?"</button>
    <button class="sim-btn" id="simulateAprender">Simular Aprendizaje</button>
    <button class="sim-btn" id="toggleMic">Activar Micrófono</button>
    <button class="sim-btn" id="clearLog">Limpiar Registro</button>
  </div>
  
  <script type="module">
    // Import Three.js from CDN for simplicity in preview
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.js';
    
    // Three.js setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('background'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);
    
    // Create a simple anime-style character
    const characterGroup = new THREE.Group();
    scene.add(characterGroup);
    
    // Head
    const headGeometry = new THREE.SphereGeometry(0.8, 32, 32);
    const headMaterial = new THREE.MeshPhongMaterial({ 
      color: 0xffccbb,
      shininess: 100,
      specular: 0xffffff
    });
    const head = new THREE.Mesh(headGeometry, headMaterial);
    head.position.y = 1.2;
    characterGroup.add(head);
    
    // Eyes
    const eyeGeometry = new THREE.SphereGeometry(0.1, 16, 16);
    const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
    
    const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    leftEye.position.set(-0.3, 1.4, 0.6);
    characterGroup.add(leftEye);
    
    const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    rightEye.position.set(0.3, 1.4, 0.6);
    characterGroup.add(rightEye);
    
    // Mouth
    const mouthGeometry = new THREE.BoxGeometry(0.3, 0.1, 0.1);
    const mouthMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
    const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
    mouth.position.set(0, 1.0, 0.7);
    characterGroup.add(mouth);
    
    // Body
    const bodyGeometry = new THREE.BoxGeometry(0.6, 1.0, 0.4);
    const bodyMaterial = new THREE.MeshPhongMaterial({ 
      color: 0x000080,
      shininess: 150,
      specular: 0x00ffff
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.position.y = 0.4;
    characterGroup.add(body);
    
    // Arms
    const armGeometry = new THREE.BoxGeometry(0.08, 0.6, 0.08);
    const armMaterial = new THREE.MeshPhongMaterial({ 
      color: 0x000080,
      shininess: 100
    });
    
    const leftArm = new THREE.Mesh(armGeometry, armMaterial);
    leftArm.position.set(-0.4, 0.4, 0);
    characterGroup.add(leftArm);
    
    const rightArm = new THREE.Mesh(armGeometry, armMaterial);
    rightArm.position.set(0.4, 0.4, 0);
    characterGroup.add(rightArm);
    
    // Legs
    const legGeometry = new THREE.BoxGeometry(0.08, 0.6, 0.08);
    const legMaterial = new THREE.MeshPhongMaterial({ 
      color: 0x000080,
      shininess: 100
    });
    
    const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
    leftLeg.position.set(-0.2, -0.4, 0);
    characterGroup.add(leftLeg);
    
    const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
    rightLeg.position.set(0.2, -0.4, 0);
    characterGroup.add(rightLeg);
    
    // Electrolaser effects (electric arcs around the character)
    const electrolaserGroup = new THREE.Group();
    scene.add(electrolaserGroup);
    
    function createElectrolaser() {
      const points = [];
      const pointCount = 20;
      for (let i = 0; i < pointCount; i++) {
        points.push(
          new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2
          ));
      }
      
      // Smooth the curve
      const spline = new THREE.CatmullRomCurve3(points);
      const geometry = new THREE.TubeGeometry(spline, 20, 0.02, 8, false);
      const material = new THREE.MeshBasicMaterial({ 
        color: 0x00ffff,
        emissive: 0x00ffff,
        transparent: true,
        opacity: 0.8
      });
      const laser = new THREE.Mesh(geometry, material);
      laser.visible = false;
      electrolaserGroup.add(laser);
      return laser;
    }
    
    const electrolasers = Array.from({length: 3}, createElectrolaser);
    
    // Animation variables
    let isListening = false;
    const clock = new THREE.Clock();
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      
      // Rotate character slowly
      characterGroup.rotation.y += 0.005;
      
      // Update electrolasers
      if (isListening) {
        electrolasers.forEach((laser, index) => {
          laser.visible = true;
          laser.rotation.z = Date.now() * 0.001 + index;
          laser.rotation.x = Date.now() * 0.0005 + index;
        });
      } else {
        electrolasers.forEach(laser => laser.visible = false);
      }
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // DOM elements
    const micButton = document.getElementById('micButton');
    const commandInput = document.getElementById('commandInput');
    const logContainer = document.getElementById('logContainer');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    // Simulation state
    let simulatedListening = false;
    
    // Logging function
    function addLog(message, type = '') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
      
      // Keep only last 30 entries
      while (logContainer.children.length > 30) {
        logContainer.removeChild(logContainer.firstChild);
      }
    }
    
    // Initial log
    addLog('Vista previa de EVO-Asistente iniciada', 'info');
    addLog('Esta es solo la interfaz visual - funcionalidad simulada', 'info');
    
    // Event listeners for simulation
    document.getElementById('toggleMic').addEventListener('click', () => {
      simulatedListening = !simulatedListening;
      isListening = simulatedListening; // Sync with Three.js
      
      if (simulatedListening) {
        document.getElementById('toggleMic').textContent = 'Desactivar Micrófono';
        document.getElementById('toggleMic').classList.add('active');
        statusDot.classList.add('listening');
        statusText.textContent = 'Escuchando...';
        addLog('Micrófono activado (simulado)', 'info');
      } else {
        document.getElementById('toggleMic').textContent = 'Activar Micrófono';
        document.getElementById('toggleMic').classList.remove('active');
        statusDot.classList.remove('listening');
        statusText.textContent = 'En espera';
        addLog('Micrófono desactivado (simulado)', 'info');
      }
    });
    
    document.getElementById('clearLog').addEventListener('click', () => {
      logContainer.innerHTML = '';
      addLog('Registro limpiado', 'info');
    });
    
    document.getElementById('simulateHola').addEventListener('click', () => {
      // Simulate voice input
      commandInput.value = 'hola';
      processSimulatedCommand('hola');
    });
    
    document.getElementById('simulateHora').addEventListener('click', () => {
      commandInput.value = 'qué hora es';
      processSimulatedCommand('qué hora es');
    });
    
    document.getElementById('simulateAprender').addEventListener('click', () => {
      commandInput.value = 'calcula el factorial de 5';
      processSimulatedCommand('calcula el factorial de 5');
    });
    
    // Mic button click (alternative)
    micButton.addEventListener('click', () => {
      document.getElementById('toggleMic').click();
    });
    
    // Enter key in input
    commandInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        processSimulatedCommand(commandInput.value);
      }
    });
    
    function processSimulatedCommand(cmd) {
      if (!cmd.trim()) return;
      
      addLog(`> ${cmd}`, 'info');
      
      // Simulate processing delay
      statusDot.classList.add('listening');
      statusText.textContent = 'Procesando...';
      
      setTimeout(() => {
        // Simulate different responses based on command
        let response = '';
        let type = 'success';
        
        if (cmd.toLowerCase().includes('hola')) {
          response = 'Buenos días. Soy EVO-Asistente, tu asistente de voz con capacidad de auto-aprendizaje. ¿En qué puedo ayudarte?';
        } else if (cmd.toLowerCase().includes('hora') || cmd.toLowerCase().includes('time')) {
          const now = new Date();
          response = `Son las ${now.toLocaleTimeString()} de ${now.toLocaleDateString()}`;
        } else if (cmd.toLowerCase().includes('factorial')) {
          // Extract number or use default
          const numMatch = cmd.match(/\d+/);
          const num = numMatch ? parseInt(numMatch[0]) : 5;
          let result = 1;
          for (let i = 2; i <= num; i++) result *= i;
          response = `El factorial de ${num} es ${result}`;
        } else if (cmd.toLowerCase().includes('abre') || cmd.toLowerCase().includes('open')) {
          response = 'Comando de sistema ejecutado: aplicación abierta';
        } else {
          // Simulate learning new skill
          response = `Habilidad creada y ejecutada: "${cmd}"`;
          type = 'info'; // Learning is special
        }
        
        addLog(`✓ ${response}`, type);
        
        statusDot.classList.remove('listening');
        statusText.textContent = 'En espera';
        
        // Clear input after processing
        commandInput.value = '';
      }, 1500); // Simulate processing delay
    }
  </script>
</body>
</html>
